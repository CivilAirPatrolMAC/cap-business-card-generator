<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<title>Civil Air Patrol Business Card Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="shortcut icon" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500&display=block" rel="stylesheet"/>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
<script src="https://unpkg.com/pdf-lib"></script>

<style>
body {
	font-family: "Ubuntu", sans-serif;
	background: #f3f4f6;
	display: flex;
	height: 100vh;
	margin: 0;
}
.left {
	background: #fff;
	flex: 1 1 40%;
	min-width: 400px;
	max-width: 600px;
	padding: 40px;
	overflow-y: auto;
}
.right {
	flex: 1 1 60%;
}
input, select, textarea {
	border: 1px solid #9ea2a2;
	border-radius: 5px;
	padding: 8px;
	width: 100%;
	margin-top: 5px;
}
input.error, textarea.error, select.error {
	border-color: #ba0c2f;
	background: rgba(186,12,47,0.05);
}
button {
	background: #001489;
	color: #fff;
	border: 0;
	padding: 10px 20px;
	border-radius: 5px;
	cursor: pointer;
	margin-top: 15px;
}
</style>

<script>
let font, fontBold;
let isError = false;
let grade_type = "Adult";
let no_rank = false;

const vals = {
	grade: "2nd Lt.",
	name: "Jane Doe",
	title: "",
	unit: "",
	address: "",
	phone_1_type: "M",
	phone_1: "",
	phone_2_type: "M",
	phone_2: "",
	email: "",
};

async function generatePdf() {
	const existingPdfBytes = await fetch("source.pdf").then(res => res.arrayBuffer());
	const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);

	font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
	fontBold = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);

	const page = pdfDoc.getPages()[0];

	let rowY = 735.6;
	const shiftY = 143.9;
	const colX = 173;

	for (let i = 0; i < 5; i++) {
		placeText(page, colX, rowY);
		placeText(page, colX + 252, rowY);
		rowY -= shiftY;
	}

	const pdfDataUri = await pdfDoc.saveAsBase64({ dataUri: true });
	document.getElementById("pdf").src = pdfDataUri;
}

function placeText(page, x, y) {
	const maxWidth = 121;

	let gradeText = no_rank ? "" :
		(grade_type === "Cadet" ? "Cadet " : "") + vals.grade;

	let nameText = vals.name;
	let gradeNameText = gradeText ? gradeText + " " + nameText : nameText;

	page.drawText(gradeNameText, {
		x: x,
		y: y,
		size: 8,
		font: fontBold,
		color: PDFLib.rgb(0, 0.09, 0.44),
	});

	if (vals.title || vals.unit) {
		page.drawText(
			(vals.title || "") + (vals.title && vals.unit ? "\n" : "") + (vals.unit || ""),
			{ x: x, y: y - 12, size: 7, font: font }
		);
	}

	if (vals.address) {
		page.drawText(vals.address, {
			x: x,
			y: y - 50,
			size: 7,
			font: font
		});
	}

	const contacts = [];
	if (vals.phone_1) contacts.push("(" + vals.phone_1_type + ") " + vals.phone_1);
	if (vals.phone_2) contacts.push("(" + vals.phone_2_type + ") " + vals.phone_2);
	if (vals.email) contacts.push(vals.email);

	if (contacts.length) {
		page.drawText(contacts.join("\n"), {
			x: x,
			y: y - 95,
			size: 7,
			font: font
		});
	}
}

function updateInput() {
	const selectedGrade = $("#grade").val();
	no_rank = selectedGrade === "__NORANK__";
	vals.grade = no_rank ? "" : selectedGrade;

	vals.name = $("#name").val() || "Jane Doe";
	vals.title = $("#title").val();
	vals.unit = $("#unit").val();
	vals.address = $("#address").val();
	vals.phone_1_type = $("#phone_1_type").val();
	vals.phone_1 = $("#phone_1").val();
	vals.phone_2_type = $("#phone_2_type").val();
	vals.phone_2 = $("#phone_2").val();
	vals.email = $("#email").val();

	generatePdf();
}

$(document).ready(function () {

	generatePdf();

	$("#grade_type").change(function () {
		grade_type = $(this).val();

		if (grade_type === "Adult") {
			$('option[data-cadet="true"]').attr("disabled", "disabled");
			$('option[data-adult="true"]').removeAttr("disabled");
		} else {
			$('option[data-adult="true"]').attr("disabled", "disabled");
			$('option[data-cadet="true"]').removeAttr("disabled");
		}

		updateInput();
	});

	$("#form").submit(function (e) {
		e.preventDefault();
		updateInput();
	});
});
</script>
</head>

<body>

<div class="left">
<h1>Civil Air Patrol Business Card Generator</h1>

<form id="form">

<label>Grade & Name</label>
<select id="grade_type">
	<option value="Adult" selected>Adult</option>
	<option value="Cadet">Cadet</option>
</select>

<select id="grade">
	<optgroup label="No Rank">
		<option value="__NORANK__" data-adult="true">No Rank</option>
	</optgroup>

	<optgroup label="Adult Grades">
		<option value="" data-adult="true">Adult Member</option>
		<option value="Flight Officer" data-adult="true">Flight Officer</option>
		<option value="Tech. Flight Officer" data-adult="true">Tech. Flight Officer</option>
		<option value="Senior Flight Officer" data-adult="true">Senior Flight Officer</option>
		<option value="2nd Lt." data-adult="true" selected>2nd Lt.</option>
		<option value="1st Lt." data-adult="true">1st Lt.</option>
		<option value="Capt." data-adult="true">Capt.</option>
		<option value="Maj." data-adult="true">Maj.</option>
		<option value="Lt. Col." data-adult="true">Lt. Col.</option>
		<option value="Col." data-adult="true">Col.</option>
	</optgroup>

	<optgroup label="Cadet Grades">
		<option value="Airman Basic" data-cadet="true" disabled>Airman Basic</option>
		<option value="Airman" data-cadet="true" disabled>Airman</option>
		<option value="Airman 1st Class" data-cadet="true" disabled>Airman 1st Class</option>
		<option value="Senior Airman" data-cadet="true" disabled>Senior Airman</option>
		<option value="Staff Sgt." data-cadet="true" disabled>Staff Sgt.</option>
	</optgroup>
</select>

<input type="text" id="name" placeholder="Jane Doe" />

<label>Duty Position</label>
<input type="text" id="title" />

<label>Unit</label>
<input type="text" id="unit" />

<label>Address</label>
<textarea id="address"></textarea>

<label>Phone</label>
<select id="phone_1_type">
	<option value="M">Mobile</option>
	<option value="H">Home</option>
	<option value="O">Office</option>
</select>
<input type="text" id="phone_1" />

<label>Second Phone</label>
<select id="phone_2_type">
	<option value="M">Mobile</option>
	<option value="H">Home</option>
	<option value="O">Office</option>
</select>
<input type="text" id="phone_2" />

<label>Email</label>
<input type="text" id="email" />

<button type="submit">Save Changes</button>

</form>
</div>

<div class="right">
<iframe id="pdf" style="width:100%; height:100%; border:0;"></iframe>
</div>

</body>
</html>
